<!DOCTYPE html>
<html>
<head>
    <title>IoT Projekt</title>
    <style>
        body {
			font-family: Arial;
			max-width: 800px;
			margin: 0 auto;
			padding: 20px;
		}
		
        button {
			padding: 10px 20px;
			font-size: 16px;
			cursor: pointer;
		}
		
        .rgb-slider {
			width: 100%;
			margin: 10px 0;
		}
			.color-box {
			width: 100px;
			height: 100px;
			border: 1px solid black;
			margin: 10px 0;
		}
		
        #temp {
			font-size: 24px;
			font-weight: bold;
		}

        #light {
            font-size: 24px;
            font-weight: bold;
        }

        .card {
			border: 1px solid #ccc;
			border-radius: 5px;
			padding: 15px;
			margin: 10px 0;
		}

        .automatic-manual{
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 10px;
            box-sizing: border-box;
        }

        .button-header{
            flex: 1;
            min-width: 0;
            padding: 15px 0;
            width: 100%;
            box-sizing: border-box;
        }

        img{
            width: 18px;
        }

        .button-values{
            display: flex;
            gap: 12px;
        }


        /* Kontejner pro celý přepínač i s texty */
        .mode-switch-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            font-weight: bold;
        }

        /* Samotný přepínač */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        /* Schováme výchozí ošklivý checkbox */
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Pozadí přepínače (kolejnička) */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; /* Šedá pro manuální mód */
            transition: .4s;
            border-radius: 34px;
        }

        /* Kolečko v přepínači */
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* Jak to vypadá, když se přepne na Automatický (checked) - Neonový efekt */
        input:checked + .slider {
            background-color: #39ff14; /* Fialová neonová */
            box-shadow: 0 0 10px #39ff14;
        }

        /* Pohyb kolečka doprava */
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <h1>IoT Ovládání</h1>
    
    <div class="mode-switch-container">
        <span class="mode-label">Manuální</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle" onchange="handleModeChange()">
            <span class="slider"></span>
        </label>
        <span class="mode-label">Automatický</span>
    </div>

    <div class="card manual">
        <h2>RGB LED</h2>
        <div class="color-box" id="rgb-preview"></div>
        
        <label>Červená (pin 11): <span id="r-val">0</span></label>
        <input type="range" class="rgb-slider" id="r-slider" min="0" max="255" value="0">
        
        <label>Zelená (pin 10): <span id="g-val">0</span></label>
        <input type="range" class="rgb-slider" id="g-slider" min="0" max="255" value="0">
        
        <label>Modrá (pin 9): <span id="b-val">0</span></label>
        <input type="range" class="rgb-slider" id="b-slider" min="0" max="255" value="0">
        
        <button onclick="sendRGB()">Nastavit barvu</button>
        <!--<button onclick="resetRGB()">Zapnout</button>-->
        <button onclick="resetRGB()">Vypnout</button>
    </div>
    
    <div class="card manual">
        <h2>Teplota</h2>
        <p id="temp">--- °C</p>
        <button class="button-values" onclick="readTemp()"><img src="img/temperature-high.svg"/> Změřit teplotu</button>
    </div>
    
    <div class="card manual">
        <h2>Osvětlení</h2>
        <p id="light">--- (jednotka osvětlení)</p>
        <button class="button-values" onclick="readLight()"><img src="img/lightbulb-on.svg"> Změřit světelnost</button>
    </div>

    <div class="automatic" style="display: none;">

        <section class="card threshold-setting">
            <h3>Nastavení hranice osvětlení</h3>
            <label style="display: inline;" for="threshold-input">
                Hranice osvětlení (lux):
            </label>
            <input
                style="width: 134.788px; height: 41.6px; box-sizing: border-box; vertical-align: middle;"
                type="number"
                id="threshold-input"
                name="threshold"
                min="0"
                max="1000"
                value="300"
                placeholder="Hodnota v lux"
            >
            <button style="vertical-align: middle;" id="threshold-save-btn" type="button">
                Uložit hranici
            </button>
        </section>
        <section class="card current-values">
            <h3>Aktuální hodnoty</h3>
            <p>
                Aktuální teplota:
                <span id="auto-temp">---</span> °C
            </p>
            <p>
                Aktuální intenzita osvětlení:
                <span id="auto-light">---</span> lux
            </p>
            <p>
                Stav RGB LED:
                <span id="auto-led-status">---</span>
            </p>
        </section>
    </div>
    
    <script>
        const BACKEND_URL = 'http://localhost:5000';
        
        // Kontrola backendu
        async function checkBackend() {
            try {
                const response = await fetch(BACKEND_URL);
                const data = await response.json();
                document.getElementById('backend-status').innerHTML = 
                    `✅ Připojeno (Arduino: ${data.arduino})`;
            } catch (e) {
                document.getElementById('backend-status').innerHTML = '❌ Backend neodpovídá';
            }
        }
        
        // RGB
        async function sendRGB() {
            const r = document.getElementById('r-slider').value;
            const g = document.getElementById('g-slider').value;
            const b = document.getElementById('b-slider').value;
            
            updatePreview(r, g, b);
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/rgb`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({r, g, b})
                });
                const data = await response.json();
                console.log('RGB OK:', data);
            } catch (e) {
                alert('Chyba');
            }
        }
        
        function updatePreview(r, g, b) {
            document.getElementById('rgb-preview').style.backgroundColor = 
                `rgb(${r}, ${g}, ${b})`;
            document.getElementById('r-val').textContent = r;
            document.getElementById('g-val').textContent = g;
            document.getElementById('b-val').textContent = b;
        }
        
        // Reset RGB
        function resetRGB() {
            document.getElementById('r-slider').value = 0;
            document.getElementById('g-slider').value = 0;
            document.getElementById('b-slider').value = 0;
            updatePreview(0, 0, 0);
            sendRGB();
        }
        
        // Teplota
        async function readTemp() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/temp`);
                const data = await response.json();
                document.getElementById('temp').innerHTML = 
                    `${data.temperature} °C`;
            } catch (e) {
                alert('Chyba');
            }
        }

        // Svetlo
        async function readLight() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/light`);
                const data = await response.json();
                document.getElementById('light').innerHTML = `${data.light} lux`;
            } catch (e) {
                alert('Chyba při čtení světelnosti');
            }
        }
        
       
        // Event listeners pro slidery
        document.getElementById('r-slider').addEventListener('input', function() {
            document.getElementById('r-val').textContent = this.value;
            updatePreview(this.value, 
                document.getElementById('g-slider').value,
                document.getElementById('b-slider').value);
        });
        
        document.getElementById('g-slider').addEventListener('input', function() {
            document.getElementById('g-val').textContent = this.value;
            updatePreview(
                document.getElementById('r-slider').value,
                this.value,
                document.getElementById('b-slider').value);
        });
        
        document.getElementById('b-slider').addEventListener('input', function() {
            document.getElementById('b-val').textContent = this.value;
            updatePreview(
                document.getElementById('r-slider').value,
                document.getElementById('g-slider').value,
                this.value);
        });
        
        // Automatická kontrola při načtení
        
        
        // Funkce pro přepínání na manuální mód
        function switchToManual() {
            document.querySelectorAll('.manual').forEach(el => el.style.display = 'block');
            document.querySelectorAll('.automatic').forEach(el => el.style.display = 'none');
        }
        
        // Funkce pro přepínání na automatický mód
        function switchToAutomatic() {
            document.querySelectorAll('.manual').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.automatic').forEach(el => el.style.display = 'block');
        }
    
        async function handleModeChange() {
            const toggle = document.getElementById('mode-toggle');
            
            // Tohle zařídí změnu vzhledu na tvém frontendu
            if (toggle.checked) {
                switchToAutomatic();
            } else {
                switchToManual();
            }

            try {
                await fetch(`${BACKEND_URL}/api/mode`, {
                    method: 'POST'
                });
                console.log('Backendu odeslán povel ke změně módu');
            } catch (e) {
                console.error('Chyba při komunikaci s backendem ohledně módů');
            }
        }

        

        checkBackend();
    </script>
</body>
</html>
