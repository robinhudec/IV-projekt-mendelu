<!DOCTYPE html>
<!-- ===== STRUKTURA STRÁNKY =====
     HTML5 dokument pro IoT projekt - webové rozhraní pro ovládání Arduino zařízení
-->
<html>
<head>
    <title>IoT Projekt</title>
    <style>
        /* ===== ZÁKLADNÍ STYLY =====
         * Nastavení vzhledu celé stránky
         */
        body {
			font-family: Arial;
			max-width: 800px;
			margin: 0 auto;
			padding: 20px;
		}
		
        /* Tlačítka - vzhled a interakce */
        button {
			padding: 10px 20px;
			font-size: 16px;
			cursor: pointer;
		}
		
        /* RGB slidery - posuvníky pro výběr barvy */
        .rgb-slider {
			width: 100%;
			margin: 10px 0;
		}
		
        /* Náhledový čtvereček barvy */
		.color-box {
			width: 100px;
			height: 100px;
			border: 1px solid black;
			margin: 10px 0;
		}
		
        /* Zobrazení teploty - velký tučný text */
        #temp {
			font-size: 24px;
			font-weight: bold;
		}

        /* Zobrazení osvětlení - velký tučný text */
        #light {
            font-size: 24px;
            font-weight: bold;
        }

        /* Karty - kontejnery pro jednotlivé sekce */
        .card {
			border: 1px solid #ccc;
			border-radius: 5px;
			padding: 15px;
			margin: 10px 0;
		}

        /* Rozložení tlačítek manuálního/automatického módu */
        .automatic-manual{
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 10px;
            box-sizing: border-box;
        }

        .button-header{
            flex: 1;
            min-width: 0;
            padding: 15px 0;
            width: 100%;
            box-sizing: border-box;
        }

        /* Ikony - nastavení velikosti */
        img{
            width: 18px;
        }

        /* Rozložení hodnot u tlačítek */
        .button-values{
            display: flex;
            gap: 12px;
        }

        /* ===== PŘEPÍNAČ REŽIMŮ (MANUÁLNÍ / AUTOMATICKÝ) =====
         * Kontejner pro celý přepínač i s texty
         */
        .mode-switch-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            font-weight: bold;
        }

        /* Samotný přepínač - zapouzdření */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        /* Schováme výchozí ošklivý checkbox */
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Pozadí přepínače (kolejnička) */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; /* Šedá pro manuální mód */
            transition: .4s;
            border-radius: 34px;
        }

        /* Kolečko v přepínači */
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* Jak to vypadá, když se přepne na Automatický (checked) - Neonový efekt */
        input:checked + .slider {
            background-color: #39ff14; /* Zelená neonová pro automatický mód */
            box-shadow: 0 0 10px #39ff14;
        }

        /* Pohyb kolečka doprava při aktivaci automatického módu */
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <!-- ===== HLAVIČKA STRÁNKY ===== -->
    <h1>IoT Ovládání</h1>
    
    <!-- ===== PŘEPÍNAČ REŽIMŮ =====
         Zde uživatel přepíná mezi manuálním a automatickým režimem
         - Vlevo: "Manuální" = ruční ovládání všech prvků
         - Vpravo: "Automatický" = systém se řídí sám podle nastavených pravidel
    -->
    <div class="mode-switch-container">
        <span class="mode-label">Manuální</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle" onchange="handleModeChange()">
            <span class="slider"></span>
        </label>
        <span class="mode-label">Automatický</span>
    </div>

    <!-- ===== MANUÁLNÍ REŽIM =====
         Sekce viditelné pouze v manuálním režimu
         class="manual" = skryje se při přepnutí na automatický mód
    -->
    
    <!-- Karta 1: RGB LED ovládání -->
    <div class="card manual">
        <h2>RGB LED</h2>
        <!-- Náhledový čtvereček - zobrazuje aktuálně vybranou barvu -->
        <div class="color-box" id="rgb-preview"></div>
        
        <!-- 3 slidery pro výběr barvy (0 = vypnuto, 255 = max) -->
        <label>Červená (pin 11): <span id="r-val">0</span></label>
        <input type="range" class="rgb-slider" id="r-slider" min="0" max="255" value="0">
        
        <label>Zelená (pin 10): <span id="g-val">0</span></label>
        <input type="range" class="rgb-slider" id="g-slider" min="0" max="255" value="0">
        
        <label>Modrá (pin 9): <span id="b-val">0</span></label>
        <input type="range" class="rgb-slider" id="b-slider" min="0" max="255" value="0">
        
        <!-- Tlačítko pro odeslání barvy na Arduino -->
        <button onclick="sendRGB()">Nastavit barvu</button>
        <!-- Tlačítko pro vypnutí LED (nastaví všechny barvy na 0) -->
        <button onclick="resetRGB()">Vypnout</button>
    </div>
    
    <!-- Karta 2: Teplota -->
    <div class="card manual">
        <h2>Teplota</h2>
        <!-- Zde se zobrazí naměřená teplota -->
        <p id="temp">--- °C</p>
        <!-- Tlačítko pro spuštění měření teploty -->
        <button class="button-values" onclick="readTemp()"><img src="img/temperature-high.svg"/> Změřit teplotu</button>
    </div>
    
    <!-- Karta 3: Osvětlení -->
    <div class="card manual">
        <h2>Osvětlení</h2>
        <!-- Zde se zobrazí naměřená hodnota osvětlení -->
        <p id="light">--- (jednotka osvětlení)</p>
        <!-- Tlačítko pro spuštění měření světelnosti -->
        <button class="button-values" onclick="readLight()"><img src="img/lightbulb-on.svg"> Změřit světelnost</button>
    </div>

    <!-- ===== AUTOMATICKÝ REŽIM =====
         Sekce viditelné pouze v automatickém režimu
         class="automatic" = skryje se při přepnutí na manuální mód
         style="display: none;" = výchozí stav (skryto)
    -->
    <div class="automatic" style="display: none;">

        <!-- Nastavení prahové hodnoty pro automatické řízení -->
        <section class="card threshold-setting">
            <h3>Nastavení hranice osvětlení</h3>
            <label style="display: inline;" for="threshold-input">
                Hranice osvětlení (lux):
            </label>
            <input
                style="width: 134.788px; height: 41.6px; box-sizing: border-box; vertical-align: middle;"
                type="number"
                id="threshold-input"
                name="threshold"
                min="0"
                max="1000"
                value="300"
                placeholder="Hodnota v lux"
            >
            <button style="vertical-align: middle;" id="threshold-save-btn" type="button">
                Uložit hranici
            </button>
        </section>
        
        <!-- Zobrazení aktuálních hodnot ze senzorů -->
        <section class="card current-values">
            <h3>Aktuální hodnoty</h3>
            <p>
                Aktuální teplota:
                <span id="auto-temp">---</span> °C
            </p>
            <p>
                Aktuální intenzita osvětlení:
                <span id="auto-light">---</span> lux
            </p>
            <p>
                Stav RGB LED:
                <span id="auto-led-status">---</span>
            </p>
        </section>
    </div>
    
    <script>
        // ===== KONFIGURACE =====
        // Adresa backend serveru - komunikační bod mezi frontendem a backendem
        const BACKEND_URL = 'http://localhost:5000';
        
        // ===== KONTROLA SPOJENÍ =====
        // Funkce: checkBackend()
        // Účel: Ověří, zda běží backend a zda je připojeno Arduino
        // Co dělá: Posílá GET požadavek na root adresu backendu a zobrazí stav připojení
        async function checkBackend() {
            try {
                const response = await fetch(BACKEND_URL);
                const data = await response.json();
                document.getElementById('backend-status').innerHTML = 
                    `✅ Připojeno (Arduino: ${data.arduino})`;
            } catch (e) {
                document.getElementById('backend-status').innerHTML = '❌ Backend neodpovídá';
            }
        }
        
        // ===== RGB LED OVLÁDÁNÍ =====
        // Funkce: sendRGB()
        // Účel: Odešle nastavené hodnoty RGB (červená, zelená, modrá) na backend
        // Co dělá: 
        //   1. Načte hodnoty ze 3 sliderů (0-255)
        //   2. Aktualizuje náhled barvy na stránce
        //   3. Odešle POST požadavek na backend /api/rgb
        async function sendRGB() {
            const r = document.getElementById('r-slider').value;
            const g = document.getElementById('g-slider').value;
            const b = document.getElementById('b-slider').value;
            
            updatePreview(r, g, b);
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/rgb`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({r, g, b})
                });
                const data = await response.json();
                console.log('RGB OK:', data);
            } catch (e) {
                alert('Chyba');
            }
        }
        
        // Funkce: updatePreview(r, g, b)
        // Účel: Zobrazí náhled vybrané barvy na stránce
        // Parametry: r, g, b - hodnoty 0-255 pro každou barevnou složku
        function updatePreview(r, g, b) {
            document.getElementById('rgb-preview').style.backgroundColor = 
                `rgb(${r}, ${g}, ${b})`;
            document.getElementById('r-val').textContent = r;
            document.getElementById('g-val').textContent = g;
            document.getElementById('b-val').textContent = b;
        }
        
        // Funkce: resetRGB()
        // Účel: Vypne RGB LED - nastaví všechny barvy na 0
        // Co dělá: Nastaví slidery na 0, aktualizuje náhled a odešle na backend
        function resetRGB() {
            document.getElementById('r-slider').value = 0;
            document.getElementById('g-slider').value = 0;
            document.getElementById('b-slider').value = 0;
            updatePreview(0, 0, 0);
            sendRGB();
        }
        
        // ===== TEPLOMĚR =====
        // Funkce: readTemp()
        // Účel: Přečte aktuální teplotu z Arduino senzoru
        // Co dělá: 
        //   1. Odešle GET požadavek na backend /api/temp
        //   2. Zobrazí teplotu na stránce ve formátu "XX °C"
        async function readTemp() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/temp`);
                const data = await response.json();
                document.getElementById('temp').innerHTML = 
                    `${data.temperature} °C`;
            } catch (e) {
                alert('Chyba');
            }
        }

        // ===== SVĚTELNÝ SENZOR =====
        // Funkce: readLight()
        // Účel: Přečte úroveň osvětlení z Arduino senzoru
        // Co dělá: 
        //   1. Odešle GET požadavek na backend /api/light
        //   2. Zobrazí hodnotu v luxech na stránce
        async function readLight() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/light`);
                const data = await response.json();
                document.getElementById('light').innerHTML = `${data.light} lux`;
            } catch (e) {
                alert('Chyba při čtení světelnosti');
            }
        }
        
        // ===== EVENT LISTENERS PRO SLIDERY =====
        // Co to je: Automatické reakce na pohyb sliderů
        // Účel: Při každém posunu slideru ihned aktualizovat náhled a hodnotu
        //   - Když uživatel posune červený slider, hned se aktualizuje náhled barvy
        //   - Nemusí klikat na tlačítko "Nastavit barvu"
        
        // Červený slider
        document.getElementById('r-slider').addEventListener('input', function() {
            document.getElementById('r-val').textContent = this.value;
            updatePreview(this.value, 
                document.getElementById('g-slider').value,
                document.getElementById('b-slider').value);
        });
        
        // Zelený slider
        document.getElementById('g-slider').addEventListener('input', function() {
            document.getElementById('g-val').textContent = this.value;
            updatePreview(
                document.getElementById('r-slider').value,
                this.value,
                document.getElementById('b-slider').value);
        });
        
        // Modrý slider
        document.getElementById('b-slider').addEventListener('input', function() {
            document.getElementById('b-val').textContent = this.value;
            updatePreview(
                document.getElementById('r-slider').value,
                document.getElementById('g-slider').value,
                this.value);
        });
        
        // ===== PŘEPÍNÁNÍ REŽIMŮ =====
        // Proměnná: mode-toggle (checkbox)
        // Účel: Uživatel může přepínat mezi manuálním a automatickým režimem
        
        // Funkce: switchToManual()
        // Účel: Zobrazí manuální ovládací prvky, skryje automatické
        function switchToManual() {
            document.querySelectorAll('.manual').forEach(el => el.style.display = 'block');
            document.querySelectorAll('.automatic').forEach(el => el.style.display = 'none');
        }
        
        // Funkce: switchToAutomatic()
        // Účel: Zobrazí automatické ovládací prvky, skryje manuální
        function switchToAutomatic() {
            document.querySelectorAll('.manual').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.automatic').forEach(el => el.style.display = 'block');
        }
    
        // Funkce: handleModeChange()
        // Účel: Hlavní handler pro přepínání režimů
        // Co dělá:
        //   1. Zjistí stav checkboxu (zaškrtnutý = automatický, nezaškrtnutý = manuální)
        //   2. Přepne zobrazení prvků na stránce
        //   3. Odešle povel na backend, aby změnil režim
        async function handleModeChange() {
            const toggle = document.getElementById('mode-toggle');
            
            // Změna vzhledu na frontendu
            if (toggle.checked) {
                switchToAutomatic();
            } else {
                switchToManual();
            }

            try {
                await fetch(`${BACKEND_URL}/api/mode`, {
                    method: 'POST'
                });
                console.log('Backendu odeslán povel ke změně módu');
            } catch (e) {
                console.error('Chyba při komunikaci s backendem ohledně módů');
            }
        }

        // ===== INICIALIZACE =====
        // Spustí kontrolu backendu při načtení stránky
        checkBackend();
    </script>
</body>
</html>
